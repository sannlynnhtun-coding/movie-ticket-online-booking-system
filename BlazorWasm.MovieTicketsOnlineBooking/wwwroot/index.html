<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <meta property="og:title" content="Cinematix — Movie Ticket Booking">
    <meta name="twitter:title" content="Cinematix — Movie Ticket Booking">
    <meta name="description" content="Book movie tickets online with Cinematix — fast, easy, and beautiful.">
    <meta property="og:description" content="Book movie tickets online with Cinematix — fast, easy, and beautiful.">
    <meta name="twitter:description" content="Book movie tickets online with Cinematix — fast, easy, and beautiful.">
    <meta property="og:image" content="https://blazor-wasm-movie-ticket-online.netlify.app/cinema-icon.svg">
    <meta name="twitter:image" content="https://blazor-wasm-movie-ticket-online.netlify.app/cinema-icon.svg">
    <meta name="theme-color" content="#0ea5e9">

    <title>Cinematix — Movie Tickets</title>
    <base href="/" />

    <!-- PWA manifest -->
    <link href="manifest.json" rel="manifest" />

    <!-- SVG Favicon (primary) -->
    <link rel="icon" type="image/svg+xml" href="cinema-icon.svg">
    <!-- Fallback PNG icons -->
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />

    <!-- Custom design system (CSS variables, component classes) -->
    <link rel="stylesheet" href="css/app.css">

    <!-- Theme initialiser: apply saved theme before first paint to prevent flash -->
    <script>
        (function () {
            var saved = localStorage.getItem('cx-theme') || 'dark';
            if (saved === 'dark') document.documentElement.classList.add('dark');
        })();
    </script>

    <!-- Tailwind CDN with Cinematix config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        accent:  { DEFAULT: '#0ea5e9', hover: '#0284c7', 300: '#7dd3fc', 500: '#0ea5e9' },
                        surface: { DEFAULT: '#1e293b', dark: '#0f172a', card: '#1e293b' },
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    },
                    borderRadius: {
                        'cx': '12px'
                    }
                }
            }
        }
    </script>

    <style>
        /* Legacy theme CSS kept for optional override */
        #blazor-error-ui {
            background: #1e293b;
            color: #e2e8f0;
            border-top: 1px solid #334155;
            bottom: 0;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.4);
            display: none;
            left: 0;
            padding: 0.6rem 1.25rem 0.7rem 1.25rem;
            position: fixed;
            width: 100%;
            z-index: 1000;
        }
        #blazor-error-ui .dismiss {
            cursor: pointer;
            position: absolute;
            right: 0.75rem;
            top: 0.5rem;
        }
        .blazor-error-boundary {
            background: #7f1d1d;
            padding: 1rem 1rem 1rem 3.7rem;
            color: white;
            border-radius: 8px;
        }
        .blazor-error-boundary::after { content: "An error has occurred." }
    </style>
</head>

<body>
    <div id="app">
        <!-- Loading splash while Blazor boots -->
        <div style="
            display:flex;flex-direction:column;align-items:center;justify-content:center;
            min-height:100vh;background:#0f172a;gap:20px;font-family:'Inter',sans-serif;">
            <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#0f172a"/>
                        <stop offset="100%" stop-color="#1e3a5f"/>
                    </linearGradient>
                    <linearGradient id="a2" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#38bdf8"/>
                        <stop offset="100%" stop-color="#0ea5e9"/>
                    </linearGradient>
                </defs>
                <rect width="64" height="64" rx="14" fill="url(#bg2)"/>
                <rect x="4" y="16" width="6" height="32" rx="2" fill="url(#a2)" opacity="0.9"/>
                <rect x="5" y="20" width="4" height="4" rx="1" fill="#0f172a"/>
                <rect x="5" y="28" width="4" height="4" rx="1" fill="#0f172a"/>
                <rect x="5" y="36" width="4" height="4" rx="1" fill="#0f172a"/>
                <rect x="54" y="16" width="6" height="32" rx="2" fill="url(#a2)" opacity="0.9"/>
                <rect x="55" y="20" width="4" height="4" rx="1" fill="#0f172a"/>
                <rect x="55" y="28" width="4" height="4" rx="1" fill="#0f172a"/>
                <rect x="55" y="36" width="4" height="4" rx="1" fill="#0f172a"/>
                <rect x="12" y="18" width="40" height="28" rx="5" fill="#1e293b"/>
                <circle cx="12" cy="32" r="3" fill="url(#bg2)"/>
                <circle cx="52" cy="32" r="3" fill="url(#bg2)"/>
                <circle cx="32" cy="30" r="9" fill="url(#a2)" opacity="0.95"/>
                <polygon points="29,25 40,30 29,35" fill="#0f172a"/>
                <circle cx="48" cy="20" r="3" fill="#f59e0b" opacity="0.85"/>
            </svg>
            <p style="color:#94a3b8;font-size:14px;letter-spacing:0.05em;">Loading Cinematix…</p>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <!-- Blazor WASM -->
    <script src="_framework/blazor.webassembly.js"></script>
    <script>navigator.serviceWorker.register('service-worker.js');</script>

    <!-- Cinematix IndexedDB + theme module (must load before Blazor calls it) -->
    <script src="js/indexeddb.js"></script>

    <!-- Legacy theme JS (kept only for backward compat) -->
    <script src="theme/js/jquery-3.3.1.min.js"></script>
    <script src="theme/js/plugins.js"></script>
    <script src="theme/js/main.js"></script>
</body>

</html>
